name: 기능 작업
description: 새 기능 또는 기능 개선 작업을 정리합니다.
title: "[Feat] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 무엇을 만들거나 개선하려는지 간단히 적어주세요.
      placeholder: "예: 입력 영상에서 일정 간격으로 프레임을 샘플링한다."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 이번 이슈에서 수정할 파일/모듈 범위를 적어주세요.
      placeholder: |
        - src/object3d/capture/**
        - tests/capture/**
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 하지 않을 것
      description: 이번 이슈에서 제외할 작업을 적어주세요.
      placeholder: "예: SAM 모델 연동, depth/pose 추정"

  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      description: 완료 여부를 어떻게 확인할지 적어주세요.
      placeholder: "예: python3 -m pytest tests/capture/"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: "작업 범위를 작게 유지했다"
          required: true
        - label: "테스트 또는 시각 검증 방법을 적었다"
          required: true
        - label: "raw data, checkpoint, reference 원본을 커밋하지 않는다"
          required: true
