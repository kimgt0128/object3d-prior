name: 버그 수정
description: 예상과 다른 동작이나 실패 사례를 정리합니다.
title: "[Fix] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 간단히 적어주세요.
      placeholder: "예: non-integer FPS 영상에서 샘플링 결과가 target_fps보다 크게 나온다."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 단계나 입력을 적어주세요.
      placeholder: |
        1. 29.97fps 영상을 입력한다.
        2. target_fps=10으로 샘플링한다.
        3. 실제 선택 frame 수를 확인한다.
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 기대 동작 / 실제 동작
      description: 기대한 결과와 실제 결과를 구분해서 적어주세요.
      placeholder: |
        기대 동작:
        - target_fps에 가깝게 샘플링된다.

        실제 동작:
        - target_fps보다 훨씬 많은 frame이 선택된다.
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      description: 수정 후 어떤 테스트로 확인할지 적어주세요.
      placeholder: "예: python3 -m pytest tests/capture/"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: "원인 후보를 기록했다"
          required: true
        - label: "수정 범위를 작게 유지했다"
          required: true
        - label: "테스트 또는 시각 검증 방법을 적었다"
          required: true
